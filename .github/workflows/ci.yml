name: CI

# Automatic triggers disabled per project owner request.
# Re-enable by uncommenting the push/pull_request blocks below.
# In the meantime you can still trigger this workflow manually from the
# Actions tab via the "Run workflow" button (workflow_dispatch).
on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  # pull_request:
  #   branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short -x
