name: Publish to PyPI

# Automatic tag publishing is disabled per project owner request.
# PyPI Trusted Publishing is not configured for this repository, so tag pushes
# should not try to publish packages automatically. Re-enable deliberately only
# after configuring the PyPI publisher or adding an explicit token flow.
on:
  workflow_dispatch:
  # push:
  #   tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
