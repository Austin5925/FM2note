# FM2note Configuration
# Copy this file to config.yaml and modify as needed:
#   cp config/config.example.yaml config/config.yaml

# Obsidian vault path — edit this here or via the Web UI (设置 → Obsidian
# Vault 路径). This is the single source of truth; the OBSIDIAN_VAULT_PATH
# env var is no longer honored as of v1.4.12 (it used to silently shadow
# Web UI edits — see CLAUDE.md Version History).
#
# Common locations:
#   ~/Documents/Obsidian                                       (local)
#   ~/Library/Mobile Documents/iCloud~md~obsidian/Documents/<vault>  (iCloud)
vault_path: "~/Documents/Obsidian"

# Subdirectory within the vault for podcast notes. Leave empty ("") if
# vault_path already points at the desired write location.
podcast_dir: "Podcasts"

# RSS polling interval (hours), used in `serve` mode
poll_interval_hours: 3

# ASR engine: funasr | paraformer | tingwu | bailian | whisper_api
# - funasr: Alibaba FunASR (recommended, Chinese-optimized, ~0.79 CNY/hour)
# - paraformer: Alibaba Paraformer (cheaper, ~0.29 CNY/hour)
# - tingwu: Alibaba TingWu (ASR + AI summary built-in, ~3 CNY/hour)
# - bailian: Alibaba Bailian ASR (DashScope SDK, up to 12h/2GB, ~0.79 CNY/hour)
# - whisper_api: OpenAI Whisper API (~$0.006/min)
asr_engine: "funasr"

# Temporary directory for audio downloads
temp_dir: "./data/tmp"

# SQLite database path for state tracking
db_path: "./data/state.db"

# Max retry attempts for failed episodes
max_retries: 3

# AI summary provider: auto | poe | openai | none
# "auto" detects based on available API keys (POE_API_KEY or OPENAI_API_KEY)
summary_provider: "auto"

# Summary model (leave empty for provider default)
# Poe default: gemini-3.1-flash-lite | OpenAI default: gpt-4o-mini
summary_model: ""

# Summary API call interval in seconds (rate limiting)
summary_cooldown: 60

# OpenAI-compatible base URL (for DeepSeek, Groq, Ollama, etc.).
# Leave empty for the official OpenAI endpoint.
summary_base_url: ""

# Log level: DEBUG | INFO | WARNING | ERROR
log_level: "INFO"

# Custom note template path (default: templates/podcast_note.md.j2)
# You can copy and modify the default template, then point to your custom one.
# template_path: "templates/my_custom_note.md.j2"
