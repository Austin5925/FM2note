# 服务器端部署：仅 RSSHub + Redis
# fm2note 在本地 Mac 运行，通过 http://macroclaw.app:1200 访问 RSSHub

services:
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: "redis://redis:6379/"
      CACHE_EXPIRE: 1800
    networks:
      - fm2note-net
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - fm2note-net
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis-data:

networks:
  fm2note-net:
    driver: bridge
