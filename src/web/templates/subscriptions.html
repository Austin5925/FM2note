{% extends "base.html" %}

{% block title %}订阅 · FM2note{% endblock %}

{% block content %}
<section>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-2xl font-semibold">订阅</h2>
      <p class="text-stone-500 text-sm">粘贴小宇宙播客链接，FM2note 会自动转成可订阅的 RSS。</p>
    </div>
    <button id="add-sub-btn"
            class="px-3 py-1.5 rounded-md bg-stone-900 text-white text-xs hover:bg-stone-700 whitespace-nowrap">
      + 添加
    </button>
  </div>

  <div id="subs-loading" class="text-sm text-stone-400">加载中…</div>
  <div id="subs-empty" class="hidden p-8 border-2 border-dashed border-stone-300 rounded-lg text-center text-sm text-stone-400">
    还没有订阅。点右上角"+ 添加"，粘贴一个小宇宙链接即可。
  </div>
  <ul id="subs-list" class="hidden space-y-3"></ul>
</section>

<!-- Backfill strategy dialog (v1.4.15) -->
<!-- Shown after the user clicks "保存" on a NEW subscription, between the
     /preview call and the real POST /api/subscriptions. -->
<div id="backfill-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl max-w-lg w-full p-6 mx-4 shadow-xl">
    <h3 class="text-lg font-semibold mb-2">这个订阅怎么处理历史剧集？</h3>
    <div id="backfill-summary" class="text-sm text-stone-700 mb-4"></div>
    <form id="backfill-form" class="space-y-3" onsubmit="return false;">
      <label class="flex items-start gap-2 p-3 rounded-md border border-stone-300 hover:bg-stone-50 cursor-pointer">
        <input type="radio" name="backfill" value="new_only" class="mt-1" checked />
        <div>
          <div class="text-sm font-medium">只转之后新发布的（推荐）</div>
          <div class="text-xs text-stone-500">现有所有剧集都跳过，只在以后有新一集时才转。<b class="text-emerald-700">额度消耗：¥0</b></div>
        </div>
      </label>
      <label class="flex items-start gap-2 p-3 rounded-md border border-stone-300 hover:bg-stone-50 cursor-pointer">
        <input type="radio" name="backfill" value="recent_n" class="mt-1" />
        <div class="flex-1">
          <div class="text-sm font-medium">只转最近 N 集</div>
          <div class="text-xs text-stone-500 mb-2">保留 N 集最新剧集等待 daemon 转录，其他跳过</div>
          <input id="backfill-recent-n" type="number" min="1" max="100" value="3" disabled
                 class="w-24 px-2 py-1 rounded border border-stone-300 text-sm font-mono" />
        </div>
      </label>
      <label class="flex items-start gap-2 p-3 rounded-md border border-stone-300 hover:bg-stone-50 cursor-pointer">
        <input type="radio" name="backfill" value="since_date" class="mt-1" />
        <div class="flex-1">
          <div class="text-sm font-medium">从某个日期之后</div>
          <div class="text-xs text-stone-500 mb-2">只转该日期当天及之后发布的剧集</div>
          <input id="backfill-since-date" type="date" disabled
                 class="px-2 py-1 rounded border border-stone-300 text-sm font-mono" />
        </div>
      </label>
      <label class="flex items-start gap-2 p-3 rounded-md border border-red-200 hover:bg-red-50 cursor-pointer">
        <input type="radio" name="backfill" value="all" class="mt-1" />
        <div>
          <div class="text-sm font-medium text-red-700">全部历史都转（谨慎）</div>
          <div class="text-xs text-stone-500" id="backfill-all-cost-hint">— 这会一次性消耗大量 DashScope / Poe 额度</div>
        </div>
      </label>
    </form>
    <div class="flex justify-end gap-2 mt-5">
      <button id="backfill-cancel-btn" type="button"
              class="px-3 py-1.5 rounded-md border border-stone-300 text-xs hover:bg-stone-50">
        取消
      </button>
      <button id="backfill-confirm-btn" type="button"
              class="px-3 py-1.5 rounded-md bg-stone-900 text-white text-xs hover:bg-stone-700">
        确认添加
      </button>
    </div>
  </div>
</div>

<!-- Add/Edit dialog -->
<div id="sub-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl max-w-lg w-full p-6 mx-4 shadow-xl">
    <h3 id="sub-modal-title" class="text-lg font-semibold mb-4">添加播客</h3>
    <form id="sub-form" class="space-y-3" onsubmit="return false;">
      <input type="hidden" id="sub-index" value="" />
      <div>
        <label class="text-xs text-stone-600">播客链接 / 小宇宙分享文本</label>
        <textarea id="sub-paste" rows="3"
                  placeholder="直接粘贴小宇宙播客页、剧集页，或复制出来的一整段分享文本"
                  class="w-full px-3 py-2 mt-1 rounded-md border border-stone-300 text-sm"></textarea>
      </div>
      <div>
        <label class="text-xs text-stone-600">RSSHub 网址</label>
        <input id="sub-rsshub-base" type="url"
               class="w-full px-3 py-2 mt-1 rounded-md border border-stone-300 text-sm font-mono" />
      </div>
      <div>
        <label class="text-xs text-stone-600">名称</label>
        <input id="sub-name" type="text" required
               class="w-full px-3 py-2 mt-1 rounded-md border border-stone-300 text-sm" />
      </div>
      <div>
        <label class="text-xs text-stone-600">最终 RSS 地址（自动生成，可手动改）</label>
        <input id="sub-rss" type="url" required
               class="w-full px-3 py-2 mt-1 rounded-md border border-stone-300 text-sm font-mono" />
      </div>
      <div>
        <label class="text-xs text-stone-600">标签（逗号分隔，可选）</label>
        <input id="sub-tags" type="text"
               class="w-full px-3 py-2 mt-1 rounded-md border border-stone-300 text-sm" />
      </div>
      <div id="sub-test-result" class="text-xs"></div>
      <div class="flex justify-between items-center pt-2">
        <div class="flex gap-2">
          <button id="sub-resolve-btn" type="button"
                  class="px-3 py-1.5 rounded-md bg-stone-900 text-white text-xs hover:bg-stone-700 whitespace-nowrap">
            自动识别
          </button>
          <button id="sub-test-btn" type="button"
                  class="px-3 py-1.5 rounded-md border border-stone-300 text-xs hover:bg-stone-50 whitespace-nowrap">
            测试 RSS
          </button>
        </div>
        <div class="flex gap-2">
          <button id="sub-cancel-btn" type="button"
                  class="px-3 py-1.5 rounded-md border border-stone-300 text-xs hover:bg-stone-50 whitespace-nowrap">
            取消
          </button>
          <button id="sub-save-btn" type="button"
                  class="px-3 py-1.5 rounded-md bg-stone-900 text-white text-xs hover:bg-stone-700 whitespace-nowrap">
            保存
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/subscriptions.js"></script>
{% endblock %}
